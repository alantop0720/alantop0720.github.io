<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航页面</title>
    <style>
/* 基础变量 */
:root {
    --primary-color: #f5a623;
    --primary-hover: #e6951a;
    --bg-color: #f5f5f5;
    --card-bg: #ffffff;
    --text-color: #333333;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border-color: #e8e8e8;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    --section-bar: #e74c3c;
}

/* 重置样式 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    transition: background-color 0.3s, color 0.3s;
}

a {
    text-decoration: none;
    color: inherit;
}

/* 头部 */
.header {
    background-color: var(--card-bg);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border-color);
    transition: background-color 0.3s;
}

.header-left {
    display: flex;
    flex-direction: column;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-icon {
    font-size: 32px;
}

.logo-text {
    font-size: 28px;
    font-weight: bold;
    color: var(--primary-color);
}

/* 容器 */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 20px;
}

/* 类别导航 */
.category-nav {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.category-tag {
    padding: 10px 24px;
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    transition: all 0.3s;
    text-decoration: none;
}

.category-tag:hover {
    border-color: var(--primary-color);
    color: var(--primary-color);
}

.category-tag.active {
    background-color: var(--primary-color);
    border-color: var(--primary-color);
    color: white;
}

/* 区块 */
.section {
    margin-bottom: 40px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-color);
}

.section-title {
    display: flex;
    align-items: center;
    gap: 12px;
}

.title-bar {
    width: 4px;
    height: 24px;
    background-color: var(--section-bar);
    border-radius: 2px;
}

.section-title h2 {
    font-size: 20px;
    font-weight: 600;
}

.section-desc {
    color: var(--text-muted);
    font-size: 14px;
}

.tool-count {
    color: var(--text-muted);
    font-size: 14px;
}

/* 工具网格 */
.tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
}

.tool-card {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px 15px;
    text-align: center;
    transition: all 0.3s;
    cursor: pointer;
}

.tool-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: var(--primary-color);
}

.tool-icon {
    font-size: 36px;
    margin-bottom: 10px;
}

.tool-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-color);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.tool-desc {
    font-size: 12px;
    color: var(--text-muted);
}

/* 回到顶部 */
.back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    background-color: var(--primary-color);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    box-shadow: 0 4px 12px rgba(245, 166, 35, 0.4);
}

.back-to-top.visible {
    opacity: 1;
    visibility: visible;
}

.back-to-top:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(245, 166, 35, 0.5);
}

/* 响应式 */
@media (max-width: 768px) {
    .header {
        padding: 15px 20px;
        flex-direction: column;
        gap: 15px;
    }

    .logo-text {
        font-size: 24px;
    }

    .container {
        padding: 20px 15px;
    }

    .category-tag {
        padding: 8px 18px;
        font-size: 13px;
    }

    .tools-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
    }

    .tool-card {
        padding: 15px 10px;
    }

    .tool-icon {
        font-size: 28px;
    }

    .tool-name {
        font-size: 12px;
    }

    .tool-desc {
        font-size: 11px;
    }
}

@media (max-width: 480px) {
    .tools-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-input { flex: 1; padding: 12px 20px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: #f5a623; }
    .search-btn { padding: 12px 24px; background: #f5a623; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .search-btn:hover { background: #e6951a; }
    .no-result { text-align: center; padding: 40px; color: #999; font-size: 16px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">💼</span>
                <span class="logo-text">导航页面</span>
            </div>
        </div>
    </header>
    <div class="container" id="app">
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索网址名称或分类...">
            <button class="search-btn" id="searchBtn">搜索</button>
        </div>
    </div>
    <script>
    const NAV_DATA = {
  "宝山": [
    {
      "name": "信件收发",
      "url": "http://hcl.qv-china.com:8070/index",
      "category": "宝山",
      "visit_count": 1
    },
    {
      "name": "点名和信息发布",
      "url": "http://hcl.qv-china.com:8060/index",
      "category": "宝山",
      "visit_count": 1
    },
    {
      "name": "点名api文档",
      "url": "http://hcl.qv-china.com:8400/doc.html#/home",
      "category": "宝山",
      "visit_count": 2
    }
  ],
  "服务": [
    {
      "name": "agentqq",
      "url": "https://agent.qq.com/",
      "category": "服务",
      "visit_count": 0
    }
  ],
  "汽车": [
    {
      "name": "ota升级查询",
      "url": "https://svc.byd.com/OTA/BYDWC.html",
      "category": "汽车",
      "visit_count": 2
    }
  ],
  "天气": [
    {
      "name": "杨浦天气",
      "url": "https://forecast.weather.com.cn/town/weather1dn/101020100040.shtml#input",
      "category": "天气",
      "visit_count": 0
    }
  ],
  "资料": [
    {
      "name": "k8s电子书",
      "url": "https://jimmysong.io/zh/book/kubernetes-handbook/",
      "category": "资料",
      "visit_count": 1
    }
  ],
  "课本": [
    {
      "name": "课本",
      "url": "https://textbook.langningchen.com/",
      "category": "课本",
      "visit_count": 1
    },
    {
      "name": "课本下载",
      "url": "https://github.com/langningchen/shanghai-textbook-data/",
      "category": "课本",
      "visit_count": 0
    }
  ],
  "软件": [
    {
      "name": "nodejs",
      "url": "https://nodejs.org/en/download",
      "category": "软件",
      "visit_count": 0
    },
    {
      "name": "mimocode",
      "url": "https://mimo.xiaomi.com/mimocode",
      "category": "软件",
      "visit_count": 0
    },
    {
      "name": "atomcode",
      "url": "https://atomcode-plugin.atomgit.com/",
      "category": "软件",
      "visit_count": 0
    }
  ]
};
    
    function filterData(keyword) {
        if (!keyword) return NAV_DATA;
        const kw = keyword.toLowerCase();
        const filtered = {};
        Object.entries(NAV_DATA).forEach(([cat, urls]) => {
            const matches = urls.filter(u => 
                u.name.toLowerCase().includes(kw) || 
                (u.category && u.category.toLowerCase().includes(kw)) ||
                cat.toLowerCase().includes(kw)
            );
            if (matches.length > 0) filtered[cat] = matches;
        });
        return filtered;
    }
    
    function renderData(data) {
        const app = document.getElementById('app');
        const searchBox = app.querySelector('.search-box');
        app.innerHTML = '';
        app.appendChild(searchBox);
        
        if (Object.keys(data).length === 0) {
            app.innerHTML += '<div class="no-result">没有找到匹配的网址</div>';
            return;
        }
        
        const categoryNav = document.createElement('div');
        categoryNav.className = 'category-nav';
        app.appendChild(categoryNav);
        
        Object.keys(data).forEach((cat, i) => {
            const tag = document.createElement('a');
            tag.href = '#cat-' + i;
            tag.className = 'category-tag' + (i === 0 ? ' active' : '');
            tag.textContent = cat;
            categoryNav.appendChild(tag);
        });
        
        Object.entries(data).forEach(([cat, urls], i) => {
            const section = document.createElement('section');
            section.className = 'section';
            section.id = 'cat-' + i;
            section.innerHTML = `
                <div class="section-header">
                    <div class="section-title">
                        <span class="title-bar"></span>
                        <h2>${cat}</h2>
                    </div>
                    <span class="tool-count">${urls.length} 个工具</span>
                </div>
                <div class="tools-grid">
                    ${urls.map(u => `
                        <a href="${u.url}" class="tool-card" target="_blank">
                            <div class="tool-icon">🔗</div>
                            <div class="tool-name">${u.name}</div>
                            <div class="tool-desc">${u.category}</div>
                        </a>
                    `).join('')}
                </div>
            `;
            app.appendChild(section);
        });
        
        categoryNav.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    }
    
    renderData(NAV_DATA);
    
    document.getElementById('searchBtn').addEventListener('click', () => {
        const keyword = document.getElementById('searchInput').value.trim();
        renderData(filterData(keyword));
    });
    
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('searchBtn').click();
        }
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const keyword = e.target.value.trim();
        renderData(filterData(keyword));
    });
    </script>
</body>
</html>
